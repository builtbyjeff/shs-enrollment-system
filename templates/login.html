<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – SHS Enrollment</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body class="login-page">

  <div class="login-wrap">
    <div class="login-logo">
      <img src="https://i.imgur.com/Vs9bLaN.jpeg" alt="School Logo">
      <div class="school-name">Peña 1 National High School</div>
      <div class="school-sub">Admin Portal</div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">
            <i class="fas {% if category == 'success' %}fa-circle-check{% else %}fa-circle-exclamation{% endif %}"></i>
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}" class="login-form">
      <div class="form-group">
        <label>Username</label>
        <div class="input-icon-wrap">
          <i class="fas fa-user input-icon"></i>
          <input type="text" name="username" required placeholder="Enter username" autocomplete="username"/>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-icon-wrap">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" name="password" id="passwordField" required placeholder="Enter password" autocomplete="current-password"/>
          <button type="button" class="toggle-pw" onclick="togglePw()">
            <i class="fas fa-eye" id="pwIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-primary btn-full">
        <i class="fas fa-right-to-bracket"></i> Sign In
      </button>
    </form>

    <a href="{{ url_for('index') }}" class="back-link">
      <i class="fas fa-arrow-left"></i> Back to Home
    </a>
  </div>
  
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
