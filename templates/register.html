<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Enroll – SHS Enrollment System</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body class="form-page">

  <header class="page-header">
    <a href="{{ url_for('index') }}" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <h1 class="page-title">Student Enrollment</h1>
    <div class="spacer"></div>
  </header>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">
          <i class="fas {% if category == 'success' %}fa-circle-check{% else %}fa-circle-exclamation{% endif %}"></i>
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <div class="form-container">
    <form method="POST" action="{{ url_for('register') }}" id="enrollForm">

      <!-- Personal Info -->
      <div class="form-section">
        <div class="form-section-title">
          <i class="fas fa-user"></i> Personal Information
        </div>

        <div class="form-group">
          <label>Last Name <span class="req">*</span></label>
          <input type="text" name="last_name" required placeholder="e.g. Dela Cruz"/>
        </div>
        <div class="form-group">
          <label>First Name <span class="req">*</span></label>
          <input type="text" name="first_name" required placeholder="e.g. Juan"/>
        </div>
        <div class="form-group">
          <label>Middle Name</label>
          <input type="text" name="middle_name" placeholder="Optional"/>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Birth Date <span class="req">*</span></label>
            <input type="date" name="birth_date" required/>
          </div>
          <div class="form-group">
            <label>Gender <span class="req">*</span></label>
            <select name="gender" required>
              <option value="" disabled selected>Select</option>
              <option>Male</option>
              <option>Female</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Address <span class="req">*</span></label>
          <textarea name="address" required rows="2" placeholder="House No., Street, Barangay, City"></textarea>
        </div>
        <div class="form-group">
          <label>Contact Number <span class="req">*</span></label>
          <input type="tel" name="contact" required placeholder="09XXXXXXXXX"/>
        </div>
      </div>

      <!-- Guardian Info -->
      <div class="form-section">
        <div class="form-section-title">
          <i class="fas fa-people-roof"></i> Guardian Information
        </div>

        <div class="form-group">
          <label>Guardian / Parent Name <span class="req">*</span></label>
          <input type="text" name="guardian_name" required placeholder="Full Name"/>
        </div>
        <div class="form-group">
          <label>Guardian Contact <span class="req">*</span></label>
          <input type="tel" name="guardian_contact" required placeholder="09XXXXXXXXX"/>
        </div>
      </div>

      <!-- Academic Info -->
      <div class="form-section">
        <div class="form-section-title">
          <i class="fas fa-graduation-cap"></i> Academic Details
        </div>

        <div class="form-group">
          <label>Grade Level <span class="req">*</span></label>
          <select name="grade_level" required>
            <option value="" disabled selected>Select</option>
            <option>Grade 11</option>
            <option>Grade 12</option>
          </select>
        </div>
        <div class="form-group">
          <label>Strand <span class="req">*</span></label>
          <select name="strand" required>
            <option value="" disabled selected>Select Strand</option>
            <option>STEM</option>
            <option>ABM</option>
            <option>HUMSS</option>
            <option>TVL</option>
          </select>
        </div>
        <div class="form-group">
          <label>School Year <span class="req">*</span></label>
          <select name="school_year" required>
            <option value="" disabled selected>Select</option>
            <option>2025-2026</option>
            <option>2026-2027</option>
          </select>
        </div>
      </div>

      <button type="submit" class="btn-primary btn-full">
        <i class="fas fa-paper-plane"></i> Submit Enrollment
      </button>

    </form>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
